<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ERROR 404 — TryBild</title>
    <meta name="description" content="Page not found — TryBild Technologies, Mumbai." />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#000000" />

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000;
        color: #ffb000;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        text-align: center;
        padding: 24px;
        font-family: 'VT323', monospace;
      }
      /* CRT scanlines */
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: repeating-linear-gradient(
          0deg,
          rgba(0, 0, 0, 0.16) 0 2px,
          transparent 2px 4px
        );
      }
      h1 {
        font-family: 'Press Start 2P', monospace;
        font-size: 14px;
        line-height: 1.8;
      }
      @media (min-width: 640px) {
        h1 {
          font-size: 20px;
        }
      }
      .cur {
        display: inline-block;
        width: 10px;
        height: 16px;
        background: #fe3c00;
        vertical-align: -2px;
        margin-left: 6px;
        animation: bl 1s steps(1) infinite;
      }
      @keyframes bl {
        50% {
          opacity: 0;
        }
      }
      p {
        font-size: 21px;
        color: #c9a48f;
      }
      a.btn {
        display: inline-block;
        font-family: 'Press Start 2P', monospace;
        font-size: 9px;
        letter-spacing: 0.5px;
        color: #fff;
        background: #1c120c;
        border: 4px solid #3a2618;
        padding: 12px 16px;
        text-decoration: none;
        cursor: pointer;
      }
      a.btn:hover {
        border-color: #fe3c00;
        background: #241610;
      }
      a.btn:active {
        transform: translateY(2px);
      }
    </style>
  </head>
  <body>
    <h1>ERROR 404:<br />PAGE NOT FOUND<span class="cur"></span></h1>
    <p>&gt; THE LEVEL YOU ARE LOOKING FOR DOES NOT EXIST.</p>
    <a class="btn" href="/">BACK TO HOME</a>
  </body>
</html>
